services:
  homebox-importer:
    image: ghcr.io/koshiirra/homebox-importer:latest
    restart: unless-stopped
    environment:
      HOMEBOX_URL: ${HOMEBOX_URL:-http://homebox:7745}
      HOMEBOX_API_KEY: ${HOMEBOX_IMPORTER_API_KEY:?Set HOMEBOX_IMPORTER_API_KEY}
      HARDCOVER_API_TOKEN: ${HARDCOVER_API_TOKEN:-}
      ISBNDB_API_KEY: ${ISBNDB_API_KEY:-}
      DISCOGS_TOKEN: ${DISCOGS_TOKEN:-}
      UPCITEMDB_API_KEY: ${UPCITEMDB_API_KEY:-}
      PORT: 8080
    ports:
      - "3101:8080"

    # When HomeBox is in the same Compose project, remove this networks block.
    # Otherwise, attach both containers to the same pre-existing Docker network.
    # networks:
    #   - homebox

# networks:
#   homebox:
#     external: true
